 const opexAmt=rev*par.opexPct/100;                              // совокупные операц. расходы, тыс ₽ (вкл. ФОТ)
 // предварит. ЧП без ФОТ — нужна как база для бонусов от ЧП
 const opP0=gp+oth-opexAmt, preT0=opP0+amort+vk, tax0=preT0>0?-preT0*par.taxRate/100:0, npBeforeFOT=preT0+tax0;

   mechanics,hours,hoursTot,posts,personnel,staffTotal,staffMech,area,orders,costHr,vyr,nchMech,prod,gpM2,gpWork,partsHr,orderVal,gpPost,
   AR,INV,AP,fixed,RE,cash,assets,liabEq,opCF,invCF,finCF,netCF:cash-st.cashPrev},
  nst:{cashPrev:cash,fixedPrev:fixed,rePrev:RE,arPrev:AR,invPrev:INV,apPrev:AP,first:false}};

function engine(){

 INP_LABELS.forEach(([nm,k])=>{csv+=[nm,...rows.map(r=>Math.round(r[k]))].join(sep)+"\n";});
 const a=document.createElement("a");

function parseFile(f){
 const r=new FileReader();
 r.onload=()=>{
  try{
   const text=(""+r.result).replace(/^﻿/,"");
   const sep=text.indexOf(";")>=0?";":",";
   const lines=text.split(/\r?\n/).filter(l=>l.trim());
   let flagRow=null, dataLines=lines.slice(1);
   if(/факт/i.test(lines[1]||"")){flagRow=lines[1].split(sep).slice(1,37).map(v=>(""+v).trim());dataLines=lines.slice(2);}
   const map={};
   dataLines.forEach(l=>{const c=l.split(sep),nm=(c[0]||"").trim(),hit=INP_LABELS.find(x=>x[0]===nm);
    if(hit)map[hit[1]]=c.slice(1,37).map(v=>parseFloat((""+(v||"0")).replace(/\s|₽|"/g,"").replace(",","."))||0);});
   if(Object.keys(map).length<6){alert("Не удалось распознать строки. Используйте выгруженный шаблон и не меняйте названия показателей.");return;}
   if(!flagRow){alert("Не найдена строка «Факт? (1=да)». Скачайте шаблон заново и отметьте фактические месяцы единицей.");return;}
   const anchors={};
   for(let i=0;i<36;i++){const fl=parseFloat((flagRow[i]||"").replace(",","."));if(fl===1){const o={};INP_KEYS.forEach(k=>o[k]=(map[k]&&map[k][i])||0);anchors[i]=o;}}
   if(!Object.keys(anchors).length){alert("Не отмечено ни одного фактического периода. В строке «Факт?» поставьте 1 под нужными месяцами.");return;}
   PENDING=anchors; renderData();
  }catch(e){alert("Ошибка чтения файла: "+e);}
 };
 r.readAsText(f,"utf-8");
}

function projYear(p,yr){

 rows.forEach(r=>{const bv=baseVal(p.base,r), bon=mult*Math.max(0,bv);sBase+=bv;sBonus+=bon;if(bv>0)paid++;});

}

   <button class="btn ${MOT.basis==='uo'?'active':''}" data-basis="uo">Управленческий (по умолч.)</button>
   <button class="btn ${MOT.basis==='official'?'active':''}" data-basis="official">Официальный</button></div>`;
 const monCtl=`<div class="group"><span class="glabel">Период:</span><select id="motMon" class="btn"><option value="avg" ${motMonth==='avg'?'selected':''}>Среднее за ${yr}</option>${MON.map((mn,i)=>`<option value="${i}" ${(''+motMonth)===(''+i)?'selected':''}>${mn} ${yr}</option>`).join("")}</select></div>`;
 const presetsHtml=`<div class="presets" style="border-top:none;padding-top:0;margin:0 0 4px"><div class="ptitle">📌 Варианты мотивации <span style="font-weight:400">(💾 — записать оклады+ставки · клик — применить · 2× клик — переименовать)</span></div>`+
   MOT_PRESETS.map((p,i)=>`<span class="preset ${p.data?'has':''}" style="display:inline-flex;width:auto;margin:0 6px 6px 0;vertical-align:top"><button class="btn pload" data-mp="${i}" title="${p.data?'Применить вариант':'Слот пуст — сохраните 💾'}">${p.name}</button><button class="btn psave" data-mp="${i}" title="Сохранить текущие оклады и ставки">💾</button></span>`).join("")+`</div>`;
 let body="",lastDept="";
 stf.rows.forEach(r=>{
  if(r.dept!==lastDept){body+=`<tr class="deptrow"><td colspan="10">${r.dept}</td></tr>`;lastDept=r.dept;}
  const baseSel=Object.keys(BASE_LABELS).map(k=>`<option value="${k}" ${r.base===k?'selected':''}>${BASE_LABELS[k]}</option>`).join("");
  body+=`<tr class="${r.prod?'prodrow':''}">
    <td>${r.name}${r.prod?' · <span style="color:var(--mut);font-size:10px">продукт.</span>':''}</td>
    <td><input data-i="${r.i}" data-f="O" type="text" inputmode="numeric" value="${f0(r.O)}"></td>
    <td><input data-i="${r.i}" data-f="UO" type="text" inputmode="numeric" value="${f0(r.UO)}"></td>
    <td><select data-i="${r.i}" data-f="base">${baseSel}</select></td>
    <td class="ratecell"><input data-i="${r.i}" data-f="rate" type="number" step="${r.base==='nch'?0.1:0.05}" value="${r.rate}"><span class="unit">${r.base==='nch'?'₽/н·ч':'%'}</span></td>
    <td>${r.count}</td><td>${f0(r.bonus)}</td><td>${f0(r.zp)}</td>
    <td>${r.prod?'<span style="color:var(--mut)">в себест.</span>':f0(r.fotPos)}</td>
    <td style="white-space:nowrap"><button class="motbtn" data-sign="${r.i}" title="Документ для подписания: оклад + формула, без текущих цифр">✍️ Подписать</button> <button class="motbtn" data-calc="${r.i}" title="С расчётом за выбранный период">🧮 Расчёт</button></td></tr>`;
 });
 const head=`<tr><th>Должность</th><th>Офиц. оклад, ₽</th><th>Упр. оклад, ₽</th><th>База бонуса</th><th>Ставка</th><th>Штат</th><th>Бонус/чел, ₽</th><th>ЗП/чел, ₽</th><th>ФОТ, ₽</th><th>Документы (PDF)</th></tr>`;
 const totals=`<tr class="tot"><td>ИТОГО · непрод. ${nonProdCnt} · прод. ${prodCnt}</td><td>${f0(sO)}</td><td>${f0(sUO)}</td><td></td><td></td><td>${totCnt}</td><td>${f0(sBon)}</td><td>${f0(sZp)}</td><td>${f0(stf.fot)}</td><td></td></tr>`;
 document.getElementById("tables").innerHTML=`
  <div class="toolbar" style="position:static;border:none;padding:0 0 8px;gap:14px">${basisCtl}${monCtl}<button class="btn" id="motCombined">📚 Сводный документ (все должности)</button><button class="btn" id="motReset">↩︎ Сбросить оклады</button></div>
  ${presetsHtml}
  <div class="card">
   <h3>👥 Динамическое штатное расписание и мотивация по должностям</h3>
   <div class="note">Штат каждой должности привязан к выработке н/ч за период. Текущий диапазон: <b>${BRK[stf.bi]}</b> н/ч (${f0(m.hours)} н/ч/мес). Продуктивный персонал (механики/диагносты) в ФОТ не входит — его ЗП учтена в себестоимости услуг. ЗП = <b>${MOT.basis==='uo'?'Управленческий оклад':'Официальный оклад'}</b> + Бонус. Ставка бонуса: для ВП/ЧП — в процентах (5 = 5%); для н/ч — ₽ за 1 н/ч.</div>
   <div class="tblwrap"><table class="mottbl">${head}${body}${totals}</table></div>
   <div class="kpis" style="margin-top:14px">
     <div class="kpi"><div class="lbl">ФОТ непродукт., ₽/мес</div><div class="v">${f0(stf.fot)}</div></div>
     <div class="kpi"><div class="lbl">ФОТ налоги (×0,5), ₽/мес</div><div class="v">${f0(stf.fotTax)}</div></div>
     <div class="kpi"><div class="lbl">ФОТ ИТОГО, ₽/мес</div><div class="v">${f0(stf.fotTotal)}</div></div>
     <div class="kpi"><div class="lbl">ФОТ ИТОГО, тыс ₽/мес</div><div class="v">${f0(stf.fotTotal/1000)}</div></div>
   </div>
   <div class="note">Эти суммы попадают в «П&У» отдельными строками «ФОТ / ФОТ налоги / ФОТ ИТОГО», а «Операц. расходы» уменьшаются на ФОТ ИТОГО (без двойного счёта). Любое изменение окладов, бонусов или числа н/ч пересчитывает П&У автоматически. Изменения и варианты сохраняются в браузере.</div>
  </div>`;
 document.querySelectorAll('[data-basis]').forEach(b=>b.onclick=()=>{MOT.basis=b.dataset.basis;saveMOT();refresh();});
 document.getElementById("motMon").onchange=e=>{motMonth=e.target.value;refresh();};
 document.getElementById("motCombined").onclick=openCombinedDoc;
 document.getElementById("motReset").onclick=()=>{if(confirm("Сбросить все оклады/бонусы к демо-значениям?")){MOT.pos=JSON.parse(JSON.stringify(POS0));MOT.basis="uo";saveMOT();refresh();}};
 document.querySelectorAll('.mottbl input,.mottbl select').forEach(el=>{
   el.onchange=()=>{const i=+el.dataset.i,f=el.dataset.f;let v;
     if(f==="base")v=el.value;
     else if(f==="rate")v=+el.value||0;
     else v=+(""+el.value).replace(/[^\d.-]/g,"")||0;   // оклады: убрать пробелы-разряды
     MOT.pos[i][f]=v;saveMOT();refresh();};});
 document.querySelectorAll('[data-sign]').forEach(b=>b.onclick=()=>openMotCard(+b.dataset.sign,"sign"));
 document.querySelectorAll('[data-calc]').forEach(b=>b.onclick=()=>openMotCard(+b.dataset.calc,"calc"));
 document.querySelectorAll('.pload[data-mp]').forEach(b=>{b.onclick=()=>{const pr=MOT_PRESETS[+b.dataset.mp].data;if(!pr)return;applyMot(pr);refresh();};
   b.ondblclick=()=>{const i=+b.dataset.mp,nn=prompt("Название варианта:",MOT_PRESETS[i].name);if(nn&&nn.trim()){MOT_PRESETS[i].name=nn.trim().slice(0,24);saveMotPresets();refresh();}};});
 document.querySelectorAll('.psave[data-mp]').forEach(b=>b.onclick=()=>{MOT_PRESETS[+b.dataset.mp].data=captureMot();saveMotPresets();refresh();});
}
buildShell();controls();refresh();
</script>
</body></html>
